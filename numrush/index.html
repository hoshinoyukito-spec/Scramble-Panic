<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NUM RUSH</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100dvh;
  font-family: 'Arial Black', sans-serif;
  color: #eee;
  user-select: none;
  touch-action: manipulation;
  padding: 6px 10px;
  position: relative;
}

h1 {
  font-size: clamp(1.2em, 6vw, 2.1em);
  letter-spacing: 0.08em;
  color: #e94560;
  margin-bottom: 4px;
  text-align: center;
}

#config-area {
  display: flex;
  gap: 10px;
  margin-bottom: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.config-group {
  display: flex;
  gap: 4px;
  align-items: center;
}

.config-label {
  font-size: 0.55em;
  color: #888;
  letter-spacing: 0.08em;
  margin-right: 2px;
}

.opt-btn {
  background: #16213e;
  border: 2px solid #0f3460;
  color: #888;
  padding: 3px 8px;
  font-size: 0.68em;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.opt-btn:hover { border-color: #e94560; }
.opt-btn.active {
  background: #e94560;
  border-color: #e94560;
  color: #fff;
}

#score-area {
  display: flex;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
  justify-content: center;
}

.score-box {
  background: #16213e;
  border: 2px solid #0f3460;
  padding: 3px 12px;
  text-align: center;
  min-width: 62px;
}
.score-label { font-size: 0.55em; color: #888; letter-spacing: 0.08em; }
.score-val { font-size: 1.05em; color: #e94560; font-variant-numeric: tabular-nums; }

.score-box.next-box {
  border-color: #e94560;
  box-shadow: 0 0 10px #e9456055;
}
.next-box .score-val { font-size: 1.3em; color: #fff; }
.next-box .score-label { color: #ff8fa3; }

.score-box.hidden { display: none; }

#statusLine {
  font-size: 0.7em;
  color: #888;
  letter-spacing: 0.03em;
  margin-bottom: 4px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  min-height: 1.2em;
}
#statusLine.waiting {
  color: #e94560;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#gridWrap {
  flex: 1 1 auto;
  min-height: 0;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#grid {
  display: grid;
  gap: 6px;
  background: #0f3460;
  padding: 8px;
  border-radius: 6px;
  position: relative;
}

.cell {
  background: #16213e;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #c9e8e8;
  cursor: pointer;
  transition: transform 0.1s, background 0.15s;
}

.cell.done {
  background: #0f3460;
  color: #3a4a70;
  cursor: default;
}

.cell.wrong {
  animation: shake 0.25s;
  background: #c73652;
}

.cell.pop {
  animation: pop 0.15s ease;
}

@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

#controls {
  margin-top: 6px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}

button {
  background: #0f3460;
  border: 2px solid #e94560;
  color: #eee;
  padding: 6px 16px;
  font-size: 0.8em;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: background 0.15s;
}
button:hover { background: #e94560; }

#finishBtn.hidden { display: none; }
#finishBtn:disabled { opacity: 0.4; cursor: default; }
#finishBtn:disabled:hover { background: #0f3460; }

#hint {
  font-size: 0.6em;
  color: #555;
  margin-top: 4px;
  text-align: center;
  white-space: pre-line;
  flex-shrink: 0;
  line-height: 1.3;
}

#toast {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%) translateY(-6px);
  background: #e94560;
  color: #fff;
  padding: 5px 14px;
  border-radius: 4px;
  font-size: 0.8em;
  letter-spacing: 0.05em;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 5;
  white-space: nowrap;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

#overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(10,10,20,0.9);
  border-radius: 6px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#overlay.show { display: flex; }
#overlay-title { font-size: 1.5em; color: #e94560; }
#overlay-score { font-size: 0.85em; color: #aaa; text-align: center; line-height: 1.6; white-space: pre-line; }
#overlay button { font-size: 0.9em; }
#shareBtn { border-color: #1da1f2; }
#shareBtn:hover { background: #1da1f2; }
</style>
</head>
<body>

<h1>NUM RUSH</h1>

<div id="config-area">
  <div class="config-group">
    <span class="config-label">SIZE</span>
    <button class="opt-btn" data-size="4">4×4</button>
    <button class="opt-btn" data-size="5">5×5</button>
    <button class="opt-btn" data-size="6">6×6</button>
  </div>
  <div class="config-group">
    <span class="config-label">MODE</span>
    <button class="opt-btn" data-mode="normal">通常</button>
    <button class="opt-btn" data-mode="reverse">逆順</button>
    <button class="opt-btn" data-mode="even">偶数</button>
  </div>
  <div class="config-group">
    <span class="config-label">PLAY</span>
    <button class="opt-btn" data-endless="0">1ステージ</button>
    <button class="opt-btn" data-endless="1">エンドレス</button>
  </div>
</div>

<div id="score-area">
  <div class="score-box next-box">
    <div class="score-label">NEXT</div>
    <div class="score-val" id="nextnum">1</div>
  </div>
  <div class="score-box">
    <div class="score-label">TIME</div>
    <div class="score-val" id="time">0.00</div>
  </div>
  <div class="score-box hidden" id="stageBox">
    <div class="score-label">STAGE</div>
    <div class="score-val" id="stagenum">0</div>
  </div>
  <div class="score-box">
    <div class="score-label" id="bestLabel">BEST</div>
    <div class="score-val" id="best">--</div>
  </div>
</div>

<div id="statusLine"></div>

<div id="gridWrap">
  <div id="grid">
    <div id="toast"></div>
    <div id="overlay">
      <div id="overlay-title"></div>
      <div id="overlay-score"></div>
      <button onclick="init()">もう一度</button>
      <button id="shareBtn" onclick="shareToX()">🐦 Xでシェア</button>
    </div>
  </div>
</div>

<div id="controls">
  <button onclick="init()">NEW GAME</button>
  <button id="finishBtn" class="hidden" disabled onclick="finishEndless()">FINISH</button>
</div>
<div id="hint"></div>

<script>
const PENALTY = 0.3;
const CELL_MIN = 28;
const CELL_MAX = 92;

let size, mode, endless, sequence, order, nextIndex, startTime, penalty, timerId, running, best, completed, stagesCleared, misses, totalTaps, shareText;
let audioCtx = null;
let toastTimer;
let resizeTimer;

function init() {
  size = parseInt(localStorage.getItem('numrush_size') || '5', 10);
  mode = localStorage.getItem('numrush_mode') || 'normal';
  endless = localStorage.getItem('numrush_endless') === '1';
  syncConfigButtons();

  const total = size * size;
  order = Array.from({ length: total }, (_, i) => i + 1);
  shuffle(order);
  sequence = buildSequence(total, mode);
  nextIndex = 0;
  completed = new Set();
  penalty = 0;
  running = false;
  startTime = null;
  stagesCleared = 0;
  misses = 0;
  totalTaps = 0;
  shareText = '';

  best = parseFloat(localStorage.getItem(bestKey()) || 'NaN');
  hideOverlay();
  clearInterval(timerId);
  document.getElementById('time').textContent = '0.00';
  document.getElementById('bestLabel').textContent = endless ? 'BEST/STAGE' : 'BEST';
  document.getElementById('best').textContent = isNaN(best) ? '--' : best.toFixed(2);
  document.getElementById('hint').textContent = hintText(mode);
  document.getElementById('stageBox').classList.toggle('hidden', !endless);
  document.getElementById('stagenum').textContent = '0';
  const finishBtn = document.getElementById('finishBtn');
  finishBtn.classList.toggle('hidden', !endless);
  finishBtn.disabled = true;
  updateNextDisplay();
  render();
}

function updateNextDisplay() {
  const target = sequence[nextIndex];
  document.getElementById('nextnum').textContent = target !== undefined ? target : '-';
  updateStatusLine();
}

function updateStatusLine() {
  const el = document.getElementById('statusLine');
  if (!running) {
    el.textContent = '▶ 数字をタップすると自動でタイム計測がスタート';
    el.classList.add('waiting');
  } else {
    el.classList.remove('waiting');
    el.textContent = `${nextIndex} / ${sequence.length} 完了（範囲: ${sequence[0]} → ${sequence[sequence.length - 1]}）`;
  }
}

function bestKey() {
  return `numrush_best_${size}_${mode}_${endless ? 'endless' : 'single'}`;
}

function buildSequence(total, mode) {
  if (mode === 'reverse') {
    return Array.from({ length: total }, (_, i) => total - i);
  }
  if (mode === 'even') {
    const seq = [];
    for (let n = 2; n <= total; n += 2) seq.push(n);
    return seq;
  }
  return Array.from({ length: total }, (_, i) => i + 1);
}

function hintText(mode) {
  if (mode === 'reverse') return 'NEXT表示の数字を大きい方から探そう\nミスすると+0.3秒のペナルティ';
  if (mode === 'even') return '偶数だけを小さい順にタップ（奇数は罠）\nミスすると+0.3秒のペナルティ';
  return 'NEXT表示の数字を探してタップ\nミスすると+0.3秒のペナルティ';
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function computeCellPx() {
  const wrap = document.getElementById('gridWrap');
  const gap = 6, pad = 8;
  const availH = wrap.clientHeight - pad * 2;
  const availW = Math.min(wrap.clientWidth, 480) - pad * 2;
  const byH = (availH - (size - 1) * gap) / size;
  const byW = (availW - (size - 1) * gap) / size;
  let cell = Math.floor(Math.min(byH, byW));
  return Math.max(CELL_MIN, Math.min(cell, CELL_MAX));
}

function render() {
  const grid = document.getElementById('grid');
  const overlay = document.getElementById('overlay');
  const toast = document.getElementById('toast');
  const cellPx = computeCellPx();

  grid.style.gridTemplateColumns = `repeat(${size}, ${cellPx}px)`;
  grid.style.gridTemplateRows = `repeat(${size}, ${cellPx}px)`;
  grid.innerHTML = '';
  grid.appendChild(overlay);
  grid.appendChild(toast);

  order.forEach(num => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.style.width = cellPx + 'px';
    div.style.height = cellPx + 'px';
    div.style.fontSize = Math.round(cellPx * 0.32) + 'px';
    div.textContent = num;
    div.dataset.num = num;
    if (completed.has(num)) div.classList.add('done');
    grid.appendChild(div);
  });
}

function onCellClick(e) {
  const cell = e.target.closest('.cell');
  if (!cell || cell.classList.contains('done')) return;
  const num = parseInt(cell.dataset.num, 10);
  const target = sequence[nextIndex];

  if (!running) {
    running = true;
    startTime = performance.now();
    timerId = setInterval(updateTime, 30);
  }

  totalTaps++;

  if (num === target) {
    cell.classList.add('done', 'pop');
    completed.add(num);
    playTone(880, 0.08, 'sine');
    vibrate(20);
    nextIndex++;
    if (nextIndex >= sequence.length) {
      if (endless) {
        nextStage();
      } else {
        finish();
      }
    } else {
      updateNextDisplay();
    }
  } else {
    misses++;
    penalty += PENALTY;
    playTone(160, 0.15, 'square');
    vibrate([40, 30, 40]);
    cell.classList.remove('wrong');
    void cell.offsetWidth;
    cell.classList.add('wrong');
  }
}

function updateTime() {
  const elapsed = (performance.now() - startTime) / 1000 + penalty;
  document.getElementById('time').textContent = elapsed.toFixed(2);
}

function accuracyText() {
  const acc = totalTaps > 0 ? ((totalTaps - misses) / totalTaps) * 100 : 100;
  return `ミス: ${misses}回 / 正答率: ${acc.toFixed(0)}%`;
}

function finish() {
  running = false;
  clearInterval(timerId);
  const elapsed = (performance.now() - startTime) / 1000 + penalty;
  document.getElementById('time').textContent = elapsed.toFixed(2);
  document.getElementById('nextnum').textContent = '✓';
  document.getElementById('statusLine').textContent = `${sequence.length} / ${sequence.length} 完了（範囲: ${sequence[0]} → ${sequence[sequence.length - 1]}）`;
  const accLine = accuracyText();

  if (isNaN(best) || elapsed < best) {
    best = elapsed;
    localStorage.setItem(bestKey(), best);
    document.getElementById('best').textContent = best.toFixed(2);
    shareText = `NUM RUSHで${elapsed.toFixed(2)}秒の自己ベストを更新！`;
    setTimeout(() => showOverlay('🎉 NEW BEST!', `タイム: ${elapsed.toFixed(2)}秒\n${accLine}`), 200);
  } else {
    shareText = `NUM RUSHで${elapsed.toFixed(2)}秒でクリア！（ベスト: ${best.toFixed(2)}秒）`;
    setTimeout(() => showOverlay('CLEAR!', `タイム: ${elapsed.toFixed(2)}秒\nベスト: ${best.toFixed(2)}秒\n${accLine}`), 200);
  }
}

function nextStage() {
  stagesCleared++;
  document.getElementById('stagenum').textContent = stagesCleared;
  document.getElementById('finishBtn').disabled = false;
  showToast(`STAGE ${stagesCleared} CLEAR!`);

  const total = size * size;
  order = Array.from({ length: total }, (_, i) => i + 1);
  shuffle(order);
  sequence = buildSequence(total, mode);
  nextIndex = 0;
  completed = new Set();
  updateNextDisplay();
  render();
}

function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 700);
}

function finishEndless() {
  if (stagesCleared < 1) return;
  running = false;
  clearInterval(timerId);
  const elapsed = (performance.now() - startTime) / 1000 + penalty;
  const avg = elapsed / stagesCleared;
  document.getElementById('time').textContent = elapsed.toFixed(2);
  const accLine = accuracyText();

  if (isNaN(best) || avg < best) {
    best = avg;
    localStorage.setItem(bestKey(), best);
    document.getElementById('best').textContent = best.toFixed(2);
    shareText = `NUM RUSH エンドレスモードで${stagesCleared}ステージクリア！平均${avg.toFixed(2)}秒/ステージ`;
    setTimeout(() => showOverlay('🎉 NEW BEST!', `ステージ数: ${stagesCleared}\n合計タイム: ${elapsed.toFixed(2)}秒\n平均: ${avg.toFixed(2)}秒/ステージ\n${accLine}`), 100);
  } else {
    shareText = `NUM RUSH エンドレスモードで${stagesCleared}ステージクリア！平均${avg.toFixed(2)}秒/ステージ`;
    setTimeout(() => showOverlay('FINISH', `ステージ数: ${stagesCleared}\n合計タイム: ${elapsed.toFixed(2)}秒\n平均: ${avg.toFixed(2)}秒/ステージ\nベスト平均: ${best.toFixed(2)}秒/ステージ\n${accLine}`), 100);
  }
}

function showOverlay(title, sub) {
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-score').textContent = sub;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

function shareToX() {
  const text = shareText || 'NUM RUSHで遊んでいます！';
  const url = 'https://hub-scription.com/numrush/';
  const intent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
  window.open(intent, '_blank', 'noopener,noreferrer');
}

function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) audioCtx = new AC();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type) {
  ensureAudio();
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function syncConfigButtons() {
  document.querySelectorAll('[data-size]').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.size, 10) === size);
  });
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  document.querySelectorAll('[data-endless]').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.endless === '1') === endless);
  });
}

document.querySelectorAll('[data-size]').forEach(btn => {
  btn.addEventListener('click', () => {
    localStorage.setItem('numrush_size', btn.dataset.size);
    init();
  });
});
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    localStorage.setItem('numrush_mode', btn.dataset.mode);
    init();
  });
});
document.querySelectorAll('[data-endless]').forEach(btn => {
  btn.addEventListener('click', () => {
    localStorage.setItem('numrush_endless', btn.dataset.endless);
    init();
  });
});
document.getElementById('grid').addEventListener('click', onCellClick);
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (order) render(); }, 120);
});

init();
</script>
</body>
</html>
