<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SCRAMBLE PANIC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      touch-action: none;
      overflow: hidden;
    }
    #hud {
      display: flex;
      gap: 16px;
      margin-bottom: 6px;
      font-size: clamp(11px, 2.5vw, 16px);
      letter-spacing: 1px;
      text-shadow: 0 0 8px #fff;
      flex-wrap: wrap;
      justify-content: center;
    }
    #game-wrap { position: relative; }
    canvas {
      border: 2px solid #fff;
      box-shadow: 0 0 20px #fff4, 0 0 60px #fff2;
      image-rendering: pixelated;
      display: block;
      outline: none;
    }
    #message {
      margin-top: 8px;
      font-size: clamp(10px, 2.5vw, 13px);
      color: #888;
      letter-spacing: 1px;
      text-align: center;
    }
    #touch-controls {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 10px;
    }
    .touch-row { display: flex; gap: 4px; align-items: center; }
    .touch-btn {
      width: 50px; height: 50px;
      border: 2px solid #fff;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }
    .touch-btn:active, .touch-btn.pressed { background: rgba(255,255,255,0.35); }
    .touch-gap { width: 50px; height: 50px; }
    #boost-btn {
      font-size: 10px;
      font-weight: bold;
      border-color: #aaa;
      color: #aaa;
      background: rgba(255,255,255,0.05);
    }
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
      #message { display: none; }
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: all;
      cursor: pointer;
      padding: 20px;
      background: rgba(0,0,0,0.72);
    }
    #overlay h1 {
      font-size: clamp(24px, 7vw, 40px);
      color: #fff;
      text-shadow: 0 0 20px #fff;
      letter-spacing: 3px;
    }
    #overlay h2 {
      font-size: clamp(11px, 2.8vw, 15px);
      color: #aaa;
      font-weight: normal;
    }
    .overlay-rules {
      font-size: clamp(11px, 2.4vw, 13px);
      color: #888;
      text-align: center;
      line-height: 1.9;
    }
    .overlay-rules span { color: #fff; }
    #overlay p.start-msg {
      font-size: clamp(13px, 3.2vw, 18px);
      color: #ccc;
      animation: blink 1s step-end infinite;
      margin-top: 6px;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>WAVE: <span id="level">1</span></span>
    <span>LIVES: <span id="lives">3</span></span>
    <span>POWER: <span id="power-hud">0%</span></span>
  </div>
  <div id="game-wrap">
    <canvas id="c" width="480" height="540" tabindex="0"></canvas>
    <div id="overlay">
      <h1 id="ot">SCRAMBLE PANIC</h1>
      <h2 id="osub">スクランブル交差点パニック</h2>
      <div class="overlay-rules" id="orules">
        <span>下</span>からスタート → <span>ゴール</span>まで渡り切れ！<br>
        全方向から人が交差点を横切っている<br>
        ぶつからずに渡り切ると<span>次のウェーブ</span>へ<br>
        ライフ<span>3</span>つ &nbsp;|&nbsp; 何ウェーブまで行けるか挑戦！
      </div>
      <p class="start-msg" id="op">TAP OR PRESS SPACE</p>
    </div>
  </div>
  <div id="touch-controls">
    <div class="touch-row">
      <div class="touch-gap"></div>
      <div class="touch-btn" id="up-btn">▲</div>
      <div class="touch-gap"></div>
    </div>
    <div class="touch-row">
      <div class="touch-btn" id="left-btn">◀</div>
      <div class="touch-btn" id="boost-btn">BOOST</div>
      <div class="touch-btn" id="right-btn">▶</div>
    </div>
    <div class="touch-row">
      <div class="touch-gap"></div>
      <div class="touch-btn" id="down-btn">▼</div>
      <div class="touch-gap"></div>
    </div>
  </div>
  <div id="message">←→↑↓ / WASD で移動 &nbsp;|&nbsp; SPACE でパワー発動 &nbsp;|&nbsp; 矢印の方向にあるゴールを目指せ！</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay   = document.getElementById('overlay');
const ot        = document.getElementById('ot');
const osub      = document.getElementById('osub');
const op        = document.getElementById('op');
const orules    = document.getElementById('orules');
const scoreEl   = document.getElementById('score');
const levelEl   = document.getElementById('level');
const livesEl   = document.getElementById('lives');
const powerHudEl= document.getElementById('power-hud');

const START_X = W / 2;
const START_Y = H - 44;
const GOAL_R  = 36; // ゴール判定半径

const GOAL_OPTIONS = [
  { side: 'top',   x: W/2,  y: 36 },
  { side: 'left',  x: 36,   y: H/2 },
  { side: 'right', x: W-36, y: H/2 },
];
let goal = { ...GOAL_OPTIONS[0] };

function randomizeGoal() {
  // 直前と同じ場所は選ばない
  const choices = GOAL_OPTIONS.filter(o => !goal || o.side !== goal.side ||
    o.x !== goal.x || o.y !== goal.y);
  const opt = choices[Math.floor(Math.random() * choices.length)];
  goal = { ...opt };
}

let state = 'title';
let score = 0, level = 1, lives = 3;
let retryLevel = 1;
let player, pedestrians, particles;
let keys = {};
let tick = 0;
let spawnTimer = 0;
let power = 0;        // 0〜100
let powered = false;  // ブーストモード中
let poweredTimer = 0;

let flash = { text: '', sub: '', timer: 0, color: '#fff' };
function showFlash(text, sub, frames) {
  flash = { text, sub, timer: frames, color: '#fff' };
}

// --- Background ---
function drawCrossing() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // 四隅に歩道
  const sw = 55;
  ctx.fillStyle = '#242424';
  ctx.fillRect(0,   0,   sw, H);
  ctx.fillRect(W-sw,0,   sw, H);
  ctx.fillRect(0,   0,   W,  sw);
  ctx.fillRect(0,   H-sw,W,  sw);

  // 横断歩道 N-S（縦ストライプ）
  ctx.fillStyle = '#333';
  for (let y = sw; y < H - sw; y += 28) {
    ctx.fillRect(W/2 - 80, y, 160, 15);
  }
  // 横断歩道 E-W（横ストライプ）
  for (let x = sw; x < W - sw; x += 28) {
    ctx.fillRect(x, H/2 - 80, 15, 160);
  }
  // 斜め横断歩道
  ctx.save();
  ctx.strokeStyle = '#2c2c2c';
  ctx.lineWidth = 11;
  ctx.setLineDash([18, 14]);
  ctx.beginPath(); ctx.moveTo(sw, sw);     ctx.lineTo(W-sw, H-sw); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W-sw, sw);   ctx.lineTo(sw, H-sw);   ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // 中央交差点
  ctx.fillStyle = '#181818';
  ctx.fillRect(W/2-80, H/2-80, 160, 160);

  // 四隅の信号
  drawLight(sw/2, sw/2);
  drawLight(W-sw/2, sw/2);
  drawLight(sw/2, H-sw/2);
  drawLight(W-sw/2, H-sw/2);

  // START表示
  ctx.fillStyle = '#444';
  ctx.font = `${Math.floor(W*0.032)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText('START', START_X, H - 10);
  ctx.textAlign = 'left';
}

// ゴールの犬を描画
function drawDog(x, y) {
  const wag = Math.sin(tick * 0.25) * 6;
  const bob = Math.sin(tick * 0.12) * 2;
  y += bob;

  ctx.fillStyle = '#fff';
  // 胴体
  ctx.fillRect(x - 16, y - 6, 32, 14);
  // 頭
  ctx.fillRect(x - 8,  y - 20, 18, 14);
  // 耳（垂れ耳）
  ctx.fillRect(x - 14, y - 22, 8, 10);
  ctx.fillRect(x + 6,  y - 22, 8, 10);
  // 鼻
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 6,  y - 12, 6, 4);
  // 目
  ctx.fillRect(x - 4,  y - 17, 4, 4);
  // 足4本
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 14, y + 8,  6, 10);
  ctx.fillRect(x - 5,  y + 8,  6, 10);
  ctx.fillRect(x + 4,  y + 8,  6, 10);
  ctx.fillRect(x + 13, y + 8,  6, 10);
  // しっぽ（ぶんぶん）
  ctx.fillRect(x + 16, y - 10 + wag, 5, 12);
  ctx.fillRect(x + 20, y - 16 + wag, 5, 8);
}

function drawGoal() {
  if (!goal) return;
  const gx = goal.x, gy = goal.y;
  const pulse = 0.5 + Math.sin(tick * 0.12) * 0.3;

  // グロー
  ctx.save();
  ctx.globalAlpha = pulse * 0.3;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 40;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(gx, gy, GOAL_R + 10, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // 犬
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  drawDog(gx, gy);
  ctx.restore();

  // GOAL文字
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 8;
  ctx.font = `bold ${Math.floor(W*0.042)}px Courier New`;
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', gx, gy + GOAL_R + 14);
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  // 方向矢印
  if (player) {
    const dx = gx - player.x, dy = gy - player.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len > 60) {
      const nx = dx/len, ny = dy/len;
      const ax = player.x + nx*44, ay = player.y + ny*44;
      ctx.globalAlpha = 0.8 + Math.sin(tick*0.18)*0.2;
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(player.x + nx*28, player.y + ny*28);
      ctx.lineTo(ax, ay);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax - nx*10 + ny*5, ay - ny*10 - nx*5);
      ctx.lineTo(ax - nx*10 - ny*5, ay - ny*10 + nx*5);
      ctx.closePath();
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }
  }
}

function drawLight(x, y) {
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 7, y - 10, 14, 22);
  const on = Math.floor(tick / 25) % 2 === 0;
  ctx.fillStyle = on ? '#fff' : '#555';
  ctx.fillRect(x - 4, y - 8, 8, 8);
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 4, y + 2, 8, 8);
}

// --- Draw person ---
function drawPerson(x, y, w, h, t, shade) {
  const walk = Math.sin(t * 0.2) * 3;
  const c = `rgb(${shade},${shade},${shade})`;
  ctx.fillStyle = c;
  ctx.fillRect(x - w*0.22, y - h*0.5,  w*0.44, w*0.38); // head
  ctx.fillRect(x - w*0.28, y - h*0.1,  w*0.56, h*0.34); // body
  ctx.fillRect(x - w*0.5,  y - h*0.05 + walk, w*0.22, h*0.07); // arm L
  ctx.fillRect(x + w*0.28, y - h*0.05 - walk, w*0.22, h*0.07); // arm R
  ctx.fillRect(x - w*0.22, y + h*0.24, w*0.18, h*0.26 + walk);  // leg L
  ctx.fillRect(x + w*0.04, y + h*0.24, w*0.18, h*0.26 - walk);  // leg R
}

// --- Draw player (hat) ---
function drawPlayer(x, y, w, h) {
  const moving = keys['ArrowLeft']||keys['a']||keys['ArrowRight']||keys['d']||
                 keys['ArrowUp']||keys['w']||keys['ArrowDown']||keys['s'];
  const walk = moving ? Math.sin(tick * 0.22) * 4 : 0;
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - w*0.3,  y - h*0.57, w*0.6,  h*0.07); // hat brim
  ctx.fillRect(x - w*0.18, y - h*0.73, w*0.36, h*0.18); // hat top
  ctx.fillRect(x - w*0.22, y - h*0.5,  w*0.44, w*0.4);  // head
  ctx.fillStyle = '#ccc';
  ctx.fillRect(x - w*0.28, y - h*0.1,  w*0.56, h*0.34); // body
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - w*0.5,  y - h*0.05 + walk, w*0.22, h*0.07);
  ctx.fillRect(x + w*0.28, y - h*0.05 - walk, w*0.22, h*0.07);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x - w*0.22, y + h*0.24, w*0.18, h*0.26 + walk);
  ctx.fillRect(x + w*0.04, y + h*0.24, w*0.18, h*0.26 - walk);
}

// --- Particles ---
function spawnExplosion(x, y) {
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, decay: Math.random()*0.04+0.02, size: Math.random()*5+2 });
  }
}

// --- Spawn pedestrian ---
function spawnPedestrian() {
  const spd = Math.min(7, 1.9 + level * 0.32);
  const spread = 0.3;

  // Horizontal walkers (main)
  const fromLeft = Math.random() < 0.5;
  let x = fromLeft ? -28 : W + 28;
  let y = 60 + Math.random() * (H - 120);
  let baseAngle = fromLeft ? 0 : Math.PI;
  let angle = baseAngle + (Math.random()-0.5) * spread;
  let vx = Math.cos(angle) * spd, vy = Math.sin(angle) * spd;

  // From level 3: also vertical walkers
  if (level >= 2 && Math.random() < 0.4) {
    const fromTop = Math.random() < 0.5;
    x = 60 + Math.random() * (W - 120);
    y = fromTop ? -28 : H + 28;
    baseAngle = fromTop ? Math.PI/2 : -Math.PI/2;
    angle = baseAngle + (Math.random()-0.5) * spread;
    vx = Math.cos(angle) * spd;
    vy = Math.sin(angle) * spd;
  }

  // From level 5: diagonal walkers
  if (level >= 3 && Math.random() < 0.3) {
    const corner = Math.floor(Math.random() * 4);
    x = corner%2===0 ? -28 : W+28;
    y = corner<2 ? -28 : H+28;
    const tx = W/2 + (Math.random()-0.5)*120;
    const ty = H/2 + (Math.random()-0.5)*120;
    const len = Math.sqrt((tx-x)**2 + (ty-y)**2);
    vx = (tx-x)/len * spd;
    vy = (ty-y)/len * spd;
  }

  const shade = 110 + Math.floor(Math.random() * 110);
  const isFast = level >= 4 && Math.random() < 0.25;
  pedestrians.push({
    x, y,
    vx: isFast ? vx*1.9 : vx,
    vy: isFast ? vy*1.9 : vy,
    w: isFast ? 13 : 18, h: isFast ? 18 : 26,
    t: Math.random() * 80, shade
  });
}

// まっすぐ突破防止：左右を往復するパトロール歩行者を初期配置
function initPatrols() {
  const count = Math.min(10, 2 + Math.floor(level / 2));
  const top = 60, bot = H - 60;
  const zone = bot - top;
  for (let i = 0; i < count; i++) {
    const y = top + (i / count) * zone;
    const spd = 1.6 + level * 0.22 + Math.random() * 0.5;
    const shade = 120 + Math.floor(Math.random() * 80);
    pedestrians.push({
      x: i % 2 === 0 ? 20 : W - 20, y,
      vx: i % 2 === 0 ? spd : -spd, vy: 0,
      w: 20, h: 28, t: Math.random()*80, shade,
      patrol: true
    });
  }
}

// ランダムスポーン側のブロッカー（プレイヤーX狙い）
function spawnBlocker() {
  const spd = Math.min(7, 1.9 + level * 0.32);
  const fromLeft = Math.random() < 0.5;
  const targetX = player ? player.x + (Math.random()-0.5)*60 : W/2;
  const y = 60 + Math.random() * (H - 120);
  const x = fromLeft ? -28 : W + 28;
  const dx = targetX - x, dy = (Math.random()-0.5) * 30;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const shade = 140 + Math.floor(Math.random() * 80);
  pedestrians.push({ x, y, vx: dx/len*spd, vy: dy/len*spd, w: 18, h: 26, t: 0, shade });
}

// --- Init ---
function init() {
  score = 0; level = 1; lives = 3;
  scoreEl.textContent = 0;
  livesEl.textContent = 3;
  resetPlayer();
}

function resetPlayer() {
  player = { x: START_X, y: START_Y, w: 22, h: 34, invincible: 0 };
  pedestrians = [];
  particles = [];
  spawnTimer = 0;
  power = 0; powered = false; poweredTimer = 0;
  powerHudEl.textContent = '0%';
  randomizeGoal();
  initPatrols();
}

// --- Update ---
function update() {
  if (state !== 'playing') {
    if (flash.timer > 0) flash.timer--;
    return;
  }
  tick++;
  if (flash.timer > 0) flash.timer--;

  // Power charges over time
  if (!powered) {
    power = Math.min(100, power + 0.12);
    powerHudEl.textContent = Math.floor(power) + '%';
  }

  // Boost activation (Space or 'z')
  if ((keys[' '] || keys['z']) && power >= 100 && !powered) {
    powered = true;
    poweredTimer = 180; // 3秒
    power = 0;
    powerHudEl.textContent = 'BOOST!';
    showFlash('BOOST!!', '弾き飛ばせ！', 40);
  }
  if (powered) {
    poweredTimer--;
    if (poweredTimer <= 0) {
      powered = false;
      powerHudEl.textContent = '0%';
    }
  }

  // Player movement
  const spd = 3.2;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp']    || keys['w']) dy -= 1;
  if (keys['ArrowDown']  || keys['s']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x = Math.max(player.w/2,    Math.min(W - player.w/2, player.x + dx*spd));
  player.y = Math.max(player.h/2,    Math.min(H - player.h/2, player.y + dy*spd));
  if (player.invincible > 0) player.invincible--;

  // Goal reached!
  const gdx = player.x - goal.x, gdy = player.y - goal.y;
  if (Math.sqrt(gdx*gdx + gdy*gdy) < GOAL_R + 12 && state === 'playing') {
    state = 'levelclear';
    const bonus = 100 + level * 50;
    score += bonus;
    scoreEl.textContent = score;
    showFlash(`WAVE ${level} クリア！`, `BONUS +${bonus}`, 100);
    setTimeout(() => {
      level++;
      levelEl.textContent = level;
      resetPlayer();
      const dirName = { top:'上', left:'左', right:'右', bottom:'下' }[goal.side];
      if (level % 10 === 0) {
        // 10の倍数はマイルストーン演出
        showFlash(`WAVE ${level} 突破！！`, `★ スコア ${score} ★`, 110);
      } else {
        showFlash(`WAVE ${level}`, `ゴールは${dirName}だ！`, 80);
      }
      setTimeout(() => { state = 'playing'; }, 1400);
    }, 1700);
    return;
  }

  // Spawn
  const interval = Math.max(14, 60 - level * 3);
  spawnTimer++;
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    spawnPedestrian();
    if (level >= 2) spawnPedestrian();
    if (level >= 8) spawnPedestrian();
    // まっすぐ突破防止：プレイヤーのX付近を横切る人を追加
    spawnBlocker();
  }

  // Update pedestrians
  for (let i = pedestrians.length - 1; i >= 0; i--) {
    const p = pedestrians[i];
    p.x += p.vx; p.y += p.vy; p.t++;
    // パトロールは壁で折り返す
    if (p.patrol) {
      if (p.x <= p.w/2 || p.x >= W - p.w/2) p.vx *= -1;
    } else {
      // 通常歩行者：画面外で除去
      if (p.x < -60 || p.x > W+60 || p.y < -60 || p.y > H+60) {
        pedestrians.splice(i, 1); continue;
      }
    }
    // 全歩行者に当たり判定
    if (Math.abs(p.x - player.x) < (p.w + player.w)*0.42 &&
        Math.abs(p.y - player.y) < (p.h + player.h)*0.42) {
      if (powered) {
        const dx = p.x - player.x, dy = p.y - player.y;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        p.vx = (dx/len) * 8;
        p.vy = (dy/len) * 8;
        spawnExplosion(p.x, p.y);
        score += 20;
        scoreEl.textContent = score;
      } else if (player.invincible <= 0) {
        hitPlayer();
        if (!p.patrol) pedestrians.splice(i, 1);
      }
    }
  } // 歩行者ループ終わり

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
} // update終わり

function hitPlayer() {
  lives--;
  livesEl.textContent = lives;
  spawnExplosion(player.x, player.y);
  power = 0; powered = false; poweredTimer = 0;
  powerHudEl.textContent = '0%';
  if (lives <= 0) {
    retryLevel = level; // このwaveから再挑戦できる
    state = 'gameover';
    ot.textContent = 'GAME OVER';
    osub.textContent = `WAVE ${level} で力尽きた…`;
    op.textContent = `SCORE: ${score}  |  TAP TO RETRY`;
    orules.style.display = 'none';
    overlay.style.display = 'flex';
  } else {
    player.x = START_X;
    player.y = START_Y;
    player.invincible = 150;
    showFlash('ぶつかった！', `残りライフ: ${lives}  スタートに戻れ`, 70);
  }
}

// --- Draw ---
function draw() {
  drawCrossing();

  if (state === 'playing' || state === 'levelclear') {
    drawGoal();

    for (const p of pedestrians) {
      drawPerson(p.x, p.y, p.w, p.h, p.t, p.shade);
    }

    if (player.invincible <= 0 || Math.floor(player.invincible/6)%2 === 0) {
      if (powered) {
        // ブースト中は光る
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 18 + Math.sin(tick*0.3)*6;
      }
      drawPlayer(player.x, player.y, player.w, player.h);
      ctx.shadowBlur = 0;
    }

    for (const p of particles) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  // Flash
  if (flash.timer > 0) {
    ctx.globalAlpha = Math.min(1, flash.timer / 20);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 14;
    ctx.font = `bold ${Math.floor(W*0.082)}px Courier New`;
    ctx.fillText(flash.text, W/2, H/2 - 18);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa';
    ctx.font = `${Math.floor(W*0.046)}px Courier New`;
    ctx.fillText(flash.sub, W/2, H/2 + 22);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }
}

// --- Loop ---
function loop() { update(); draw(); requestAnimationFrame(loop); }

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'playing' && state !== 'levelclear') {
    startGame(); e.preventDefault();
  }
  if ([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function startGame() {
  if (state === 'playing' || state === 'levelclear') return;
  orules.style.display = '';
  osub.textContent = 'スクランブル交差点パニック';
  if (state === 'gameover') {
    // ゲームオーバーからのリトライ：同じwaveから
    lives = 3; score = 0;
    level = retryLevel;
    scoreEl.textContent = 0;
    livesEl.textContent = 3;
    levelEl.textContent = level;
    resetPlayer();
  } else {
    init(); // タイトルからの新規スタート
  }
  state = 'playing';
  overlay.style.display = 'none';
  showFlash(`WAVE ${level}`, '上のGOALまで渡り切れ！', 80);
  canvas.focus();
}

overlay.addEventListener('click', startGame);
canvas.addEventListener('click', () => { if (state !== 'playing' && state !== 'levelclear') startGame(); });

function addTouchBtn(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => {
    e.preventDefault(); keys[key] = true; btn.classList.add('pressed');
    if (state !== 'playing' && state !== 'levelclear') startGame();
  }, { passive: false });
  btn.addEventListener('touchend',    e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); }, { passive: false });
  btn.addEventListener('touchcancel', ()=> { keys[key] = false; btn.classList.remove('pressed'); });
}
addTouchBtn('up-btn',    'ArrowUp');
addTouchBtn('down-btn',  'ArrowDown');
addTouchBtn('left-btn',  'ArrowLeft');
addTouchBtn('right-btn', 'ArrowRight');
addTouchBtn('boost-btn', ' ');

function resizeCanvas() {
  const size = Math.min(window.innerWidth - 8, window.innerHeight * 0.58, 480);
  canvas.style.width  = size + 'px';
  canvas.style.height = (size * 540/480) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

overlay.style.display = 'flex';
canvas.focus();
loop();
</script>
</body>
</html>
